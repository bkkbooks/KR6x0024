body:
  text: 第一心生起品第一善心欲纏八大心第一心一云何是善法耶喜俱行智相應而以色為所緣若以聲為所緣若以香味觸法為行緣若依彼等令欲纏善心生起之時其時有觸受想思心有尋伺喜樂心一境性有信根進根念根定根慧根意根喜根命根有正見正思惟正精進正念正定有信力進力念力定力慧力慚力愧力有無貪無瞋無癡無貪欲無瞋恚有正見慚愧有身輕安心輕安有身輕性心輕性有身軟性心軟性有身適應性心適應性有身正性心正性有身直性心直性有念正知有止觀勤勵不散亂其時或亦有他緣已生之無色法此等為善法二云何其時有觸其時有所有之觸接觸等觸已等觸性是為其時有觸三云何其時有受其時有所有適應之意識界觸所生之心悅心樂心觸所生之悅樂已受心觸所生之悅樂受是為其時有受四云何其時有想其時有所有適應之意識界觸所生之想等想已等想性是為其時有想五云何其時有思其時有所有適應之意識界觸所生之思等思已等思性是為其時有思六云何其時有心其時有所有之心意故意堅實心淨意意意處意根識識蘊以及適應之意識界是為其時有心七云何其時有尋其時有所有之尋求尋思惟凝想凝思以及心之專注正思惟是為其時有尋八云何其時有伺其時有所有之伺察伺隨伺近伺以及心之適應集注是為其時有伺九云何其時有喜其時有所有之勝喜歡喜極歡喜喜悅極喜悅幸福大歡喜以及心之悅豫是為其時有喜一云何其時有樂其時有所有之心悅心樂心觸所生悅樂之已受心觸所生悅樂之受是為其時有樂一一云何其時有心一境性其時有所有之心住等住堅住不散不亂意不散性等持定根定力正定是為其時有心一境性一二云何其時有信根其時有所有之信確信善解現前信信信根信力是為其時有信根一三云何其時有進根其時有所有之心發勤精勤勇猛專心策勵勤努力氣力堅忍勇猛不弛緩性志欲不棄性不棄勤愛勤愛努力精進精進根精進力正策勵是為其時有進根一四云何其時有念根其時有所有之念隨念專念念憶念性憶持性不浮遊性不忘性念念根念力正念是為其時有念根一五云何其時有定根其時有所有之心住等住安住不散不散亂意不散性等持定根定力正定是為其時有定根一六云何其時有慧根其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有慧根一七云何其時有意根其時有所有之心意故意堅實心淨意意意處意根識識蘊適應之意識界是為其時有意根一八云何其時有喜根其時有所有之心悅心樂心觸所生悅樂之已受心觸所生悅樂之受是為其時有喜根一九云何其時有命根其時有所有之彼無色諸法之壽堅住保持保有轉持續護持活命命根是為其時有命根二云何其時有正見其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有正見二一云何其時有正思惟其時有所有之尋求尋思惟凝想凝思心之專注正思惟是為其時有正思惟二二云何其時有正勤其時有所有之心發勤精勤勇猛專心策勵勤努力氣力堅忍勇猛不弛緩性志欲不棄性不棄勤愛勤愛努力精進精進根精進力正策勵是為其時有正勤二三云何其時有正念其時有所有之念隨念專念念憶念性憶持性不浮遊性不忘性念念根念力正念是為其時有正念二四云何其時有正定其時有所有之心住等住安住不散不散亂意不散性等持定根定力正定是為其時有正定二五云何其時有信力其時有所有之信確信善解現前信信信根信力是為其時有信力二六云何其時有精進力其時有所有之心發勤精勤勇猛專心策勵勤努力氣力堅忍勇猛不弛緩性志欲不棄性不棄勤愛勤愛努力精進根精進力正策勵是為其時有精進力二七云何其時有念力其時有所有之念隨念專念念憶念性憶持性不浮遊性不忘性念念根念力正念是為其時有念力二八云何其時有定力其時有所有之心住等住安住不散不散亂意不散性等住定根定力正定是為其時有定力二九云何其時有慧力其時有所有之慧智慧擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有慧力三云何其時有慚力其時有所有之慚慚應慚之事慚惡不善法之成就是為其時有慚力三一云何其時有愧力其時有所有之愧愧應愧之事愧惡不善法之成就是為其時有愧力三二云何其時有無貪其時有所有之無貪無貪著無已貪著性無遍貪無戀著無已戀著性無貪欲無貪善根是為其時有無貪三三云何其時有無瞋其時有所有之無瞋無污穢無已污穢性無瞋恚無惱害無瞋善根是為其時有無瞋三四云何其時有無癡其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有無癡三五云何其時有無貪欲其時有所有之無貪無貪著無已貪著性無遍貪無戀著無已戀著性無貪欲無貪善根是為其時有無貪三六云何其時有無瞋恚其時有所有之無瞋無污穢無已污穢性無瞋恚無惱害無瞋善根是為其時有無瞋恚三七云何其時有正見其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有正見三八云何其時有慚其時有所有之慚慚應慚之事慚惡不善法之成就是為其時有慚三九云何其時有愧其時有所有之愧愧應愧之事愧惡不善法之成就是為其時有愧四云何其時有身輕安其時有所有之受蘊想蘊行蘊之輕安休息靜沈靜止已靜止性是為其時有身輕安四一云何其時有心輕安其時有所有之識蘊之輕安休息靜沈靜止已靜止性是為其時有心輕安四二云何其時有身輕性其時有所有之受蘊想蘊行蘊之輕性輕轉變性不鈍重性不強直性是為其時有身輕性四三云何其時有心輕性其時有所有之識蘊之輕性輕轉變性不鈍重性不強直性是為其時有心輕性四四云何其時有身軟性其時有所有之受蘊想蘊行蘊之軟性柔軟性不硬性不堅實性是為其時有身軟性四五云何其時有心軟性其時有所有之識蘊之軟性柔軟性不硬性不堅實性是為其時有心軟性四六云何其時有身適應性其時有所有之受蘊想蘊行蘊之適應性適應適應狀態是為其時有身適應性四七云何其時有心適應性其時有所有之識蘊之適應性適應適應狀態是為其時有心適應性四八云何其時有身正性其時有所有之受蘊想蘊行蘊之正性正正狀態是為其時有身正性四九云何其時有心正性其時有所有識蘊之正性正正狀態是為其時有心正性五云何其時有身直性其時有所有之受蘊想蘊行蘊之直性真直性不邪歪性不歪性不奸詐性是為其時有身直性五一云何其時有心直性其時有所有識蘊之直性真直性不邪歪性不歪性不奸詐性是為其時有心直性五二云何其時有念其時有所有之念隨念專念念憶念性憶持性不浮遊性不忘性念念根念力正念是為其時有念五三云何其時有正知其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有正知五四云何其時有止其時有所有之心住等住安住不散不散亂意不散性等持定根定力正定是為其時有止五五云何其時有觀其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法正見是為其時有觀五六云何其時有勤勵其時有所有心之發勤精勤勇猛專心策勵勤努力氣力堅心勇猛不弛緩性志欲不棄性不棄勤愛勤愛努力精進精進根精進力正策勵是為其時有勤勵五七云何其時有不散亂其時有所有之心住等住安住不散不散亂意不散性等持定根定力正定是為其時有不散亂或其時又有他緣已生之無色法是等為善法句分別竟第一誦終五八其時更有四蘊二處二界三食八根五支靜慮五支道七力三因有一觸一受一想一思一心一受蘊一想蘊一行蘊一識蘊一意處一意根一意識界一法處一法界或其時又有他緣已生之無色法是等為善法五九云何其時有四蘊即受蘊想蘊行蘊識蘊六云何其時有受蘊其時有所有之心悅心樂心觸所生悅樂之已受心觸所生悅樂之受是為其時有受蘊六一云何其時有想蘊其時有所有之想等想已等想性是為其時有想蘊六二云何其時有行蘊其時有觸思尋伺喜心一境性有信根進根念根定根慧根命根正見正思惟正精進正念正定信力進力念力定力慧力慚力愧力無貪無瞋無癡無貪欲無瞋恚正見慚愧身輕安心輕安身輕性心輕性身軟性心軟性身適應性心適應性身正性心正性身直性心直性念正知止觀勤勵不散亂又其時除受蘊想蘊識蘊或又有他緣已生之無色諸法是為其時有行蘊六三云何其時有識蘊其時有所有之心意故意堅實心淨意意處意根識識蘊以及相應之意識界是為其時有識蘊參照第六項是等為其時有四蘊六四云何其時有二處即意處法處六五云何其時有意處其時有所有之心意故意堅實心淨意意處意根識識蘊以及相應之意識界是為其時有意處六六云何其時有法處即受蘊想蘊行蘊是為其時有法處是等其時有二處六七云何其時有二界即意識界法界六八云何其時有意識界其時有所有之心意故意堅實心淨意意處意根識識蘊以及相應之意識界是為其時有意識界參照第六六三六五項六九云何其時有法界即受蘊想蘊行蘊是為其時有法界是等其時有二界七云何其時有三食即觸食意思食識食七一云何其時有觸食其時有所有之觸接觸等觸已等觸性是為其時有觸食參照第二項七二云何其時有意思食其時有所有之思等思已等思性是為其時有意思食參照第五項七三云何其時有識食其時有所有之心意故意堅實心淨意意處意根識識蘊及相應之意識界是為其時有識食參照第六三項等是等為其時有三食七四云何其時有八根即信根進根念根定根慧根意根喜根命根七五云何其時有信根其時有所有之信確信善解現前信信信根信力是為其時有信根自本項至八二項止參照第一二乃至一九項七六云何其時有進根其時有所有心之發勤精勤勇猛專心策勵勤努力氣力堅忍勇猛不弛緩性志欲不棄性不棄勤愛勤愛努力精進精進根精進力正策勵是為其時有進根七七云何其時有念根其時有所有之念隨念專念念憶念性憶持性不浮遊性不忘性念念根念力正念是為其時有念根七八云何其時有定根其時有所有之心住等住安住不散不散亂意不散性等持定根定力正定是為其時有定根七九云何其時有慧根其時有所有之慧智慧擇思擇擇法解了近察各察聰睿善巧審悉審察思近解睿智憐利遍察觀正知導慧慧慧根慧力慧武器慧宮殿慧
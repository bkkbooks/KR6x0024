body:
  text: 第二色品一論母一種色聚五八三云何為無記法耶即善不善法異熟之欲纏色纏無色纏非所攝之受蘊想蘊行蘊識蘊以及諸所有之非善非不善非業異熟所應作法及一切之色與無為界是等為無記法五八四云何此中一切之色即四大種與四大種所造之色是言一切之色一切之色即非因無因因不想應有緣有為惱壞世間有漏順結順繫順暴流順軛順蓋已取著順取順雜染無記所緣非心所心不相應非異熟非異熟法法不已雜染不順雜染非有尋有伺非無尋唯伺無尋無伺非喜俱行非樂俱行非捨俱行非見非修所斷非見非修所斷因非流轉非還滅非有學非無學小欲纏非色纏非無色纏所攝非非所攝不定不出已生六識所識無常老所蔽如是為一種色聚二種色聚五八五二種色聚有色取非色取有色之已取色之不已取有色之已取順取色之不已取順取有色之有見色之無見有色之有對色之無對有色之根非色之根有色之四大種非四大種有色之表非表有色之心等起非心等起有色之心俱在非心俱在有色之心隨轉非心隨轉有色之內色之外有色之粗色之細有色之遠色之近有色之眼觸事非色之眼觸事有色之眼觸所生受乃至想乃至思乃至眼識之事非眼識之事有色之耳觸乃至鼻觸之乃至舌觸乃至身觸之事非身觸之事有色之身觸所生受乃至想乃至思乃至身識之事非身識之事有色之眼識所緣非眼識所緣有色之眼觸所生受乃至想乃至思乃至眼識所緣非眼識所緣有色之耳觸乃至鼻觸乃至舌觸乃至身觸所緣非色之身觸所緣有色之身觸所生受之乃至想之乃至思之乃至身識之所緣非身識之所緣有色之眼處非眼處有色之耳處乃至鼻處乃至舌處乃至身處非色之身處有色之色處非色處有色之聲處乃至香處乃至味處乃至觸處非觸處有色之眼界非眼界有色之耳界乃至鼻界乃至舌界乃至身界非身界有色之色界非色界有色之聲界乃至香界乃至味界乃至觸界乃至非觸有色之眼根非眼根有色之耳根乃至鼻根乃至舌根乃至身根非身根有色之女根非女根有色之男根非男根有色之命根非命根有色之身表非身表有色之語表非語表有色之空界非空界有色之水界非水界有色之色輕性非色輕性有色之色軟性非色軟性有色之色適應性非色適應性有色之色增廣非色增廣有色之色相續非色相續有色之色老性非色老性有色之色無常性非色無常性有色之摶食非摶食三種色聚五八六三種色聚即所有色之內者為取所有色之外者為有取非取所有色之內者為已取所有色之外者為有已取不已取所有色之內者為已取順取所有色之外者為有已取順取不已取順取所有色之內者為無見所有色之外者為有有見無見所有色之內者為有對所有色之外者為有有對無對所有色之內者為根所有色之外者為有根非根所有色之內者為非四大種所有色之外者為有四大種非四大種所有色之內者為非表所有色之外者為有表非表所有色之內者為非心等起所有色之外者為有心等起非心等起所有色之內者為非心俱在所有色之外者為有心俱在非心俱在所有色之內者為非心隨轉所有色之外者為有心隨轉非心隨轉所有色之內者為粗所有色之外者為有粗細所有色之內者為近所有色之外者為有近遠所有色之外者為非眼觸事所有色之內者為有眼觸事非眼觸事所有色之外者為眼觸所生之受乃至想乃至思乃至非眼識事所有色之內者為有眼識事非眼識事所有色之外者為耳觸乃至鼻觸乃至舌觸乃至非身觸事所有色之內者為有身觸事非身觸事所有色之外者為身觸所生之受乃至想乃至思乃至非身識事所有色之內者為有身識事非身識事所有色之內者為眼觸非所緣所有色之外者為有眼觸所緣眼觸非所緣所有色之內者為眼觸所生之受乃至想乃至思乃至眼識非所緣所有色之外者為有眼識所緣眼識非所緣所有色之內者為耳觸乃至鼻觸乃至舌觸乃至身觸非所緣所有色之外者有身觸所緣身觸非所緣所有色之內者為身觸所生之受乃至想乃至思乃至身識非所緣所有色之外者為有身識所緣身識非所緣所有色之外者為非眼處所有色之內者為有眼處非眼處所有色之外者為非耳處乃至非鼻處乃至非舌處乃至非身處所有色之內者為有身處非身處所有色之內者為非色處所有色之外者為有色處非色處所有色之內者為非聲處乃至非香處乃至非味處乃至非觸處所有色之外者為有觸處非觸處所有色之外者為非眼界所有色之內者為有眼界非眼界所有色之外者為非耳界乃至非鼻界乃至非舌界乃至非身界所有色之內者為有身界非身界所有色之內者為非色界所有色之外者為有色界非色界所有色之內者為非聲界乃至非香界乃至非味界乃至非觸界所有色之外者為有觸界非觸界所有色之外者為非眼根所有色之內者為有眼根非眼根所有色之外者為非耳根乃至非鼻根乃至非舌根乃至非身根所有色之內者為有身根非身根所有色之內者為非女根所有色之外者為有女根非女根所有色之內者為非男根所有色之外者為有男根非男根所有色之內者為非命根所有色之外者為有命根非命根所有色之內者為非身表所有色之外者為有身表非身表所有色之內者為非語表所有色之外者為有語表非語表所有色之內者為非空界所有色之外者為有空界非空界所有色之內者為非水界所有色之外者為有水界非水界所有色之內者為非色輕性所有色之外者為有色輕性非色輕性所有色之內者為非色軟性所有色之外者為有色軟性非色軟性所有色之內者為非色適應性所有色之外者為有色適應性非色適應性所有色之內者為非色增廣所有色之外者為有色增廣非色增廣所有色之內者為非色相續所有色之外者為有色相續非色相續所有色之內者為非色老性所有色之外者為有色老性非色老性所有色之內者為非色無常性所有色之外者為有色無常性非色無常性所有色之內者為非摶食所有色之外者為有摶食非摶食如是為三種色聚四種色聚五八七四種色聚即於所有色之取者為有已取不已取於所有色之不取者為有已取不已取於所有色之取者為有已取順取不已取順取於所有色之不取者為有已取順取不已取順取於所有色之取者為有有對無對於所有色之不取者為有有對無對於所有色之取者為有粗有細於所有色之非取者為有粗有細於所有色之取者為有遠有近於所有色之非取者為有遠有近於所有色之已取者為有有見無見於所有色之不已取者為有有見無見於所有色之已取者為有有對無對於所有色之不已取者為有有對無對於所有色之已取者為有四大種非四大種於所有色之不已取者為有四大種非四大種於所有色之已取者為有粗有細於所有色之不取者為有粗有細於所有色之已取者為有遠有近於所有色之不已取者為有遠有近於所有色之已取順取者為有有見無見於所有色之不已取順取者為有有見無見於所有色之已取順取者為有有對無對於所有色之不已取順取者為有有對無對於所有色之已取順取者為有四大種非四大種於所有色之不已取順取者為有四大種非四大種於所有色之已取順者為有粗有細於所有色之不已取順取者為有粗有細於所有色之已取順取者為有遠有近於所有色之不已取順取者為有遠有近於所有色之有對者為有根非根於所有色之無對者為有根非根於所有色之有對者為有四大種非四大種於所有色之無對者為有四大種非四大種於所有色之根者為有粗有細於所有色之非根者為有粗有細於所有色之根者為有遠有近於所有色之非根者為有遠有近於所有色之四大種者為有粗有細於所有色之非四大種者為有粗有細於所有色之四大種者為有遠有近於所有色之非四大種者為有遠有近有見聞覺識之色如是為四種色聚五種色聚五八八五種色聚即地界水界火界風界以及色之取者如是為五種色聚六種色聚五八九六種色聚即眼所識之色耳所識之色鼻所識之色舌所識之色身所識之色意所識之色如是為六種色聚七種色聚五九七種色聚即眼所識之色耳所識之色鼻所識之色舌所識之色身所識之色意所識之色意識界所識之色如是為七種色聚八種色聚五九一八種色聚即眼所識之色耳所識之色鼻所識之色舌所識之色身所識之色有樂觸苦觸意界所識之色意識界所識之色如是為八種色聚九種色聚五九二九種色聚即眼根耳根鼻根舌根身根女根男根命根以及非色根如是為九種色聚一種色聚五九三十種色聚即眼根耳根鼻根舌根身根女根男根命根及非色根之有對無對如是為十種色聚一一種色聚五九四十一種色聚即眼處耳處鼻處舌處身處色處聲處香處味處觸處及色之無見有對而法處所攝者如是為十一種色聚二注釋第一注釋五九五於一切之色唯有非因無因因不相應有緣有為色世間有漏順結順繫順暴流順軛順蓋已取著順取順雜染無記無所緣非心所心不相應非異熟非異熟法法不已雜染不順雜染非有尋有伺非無尋唯伺無尋無伺非喜俱行非樂俱行捨俱行非見非修所斷非見非修所斷因非流轉非還滅非有學非無學小欲纏非色纏非無色纏所攝非非所攝不定不出已生六識所識無常老所蔽而已如是為一種色聚第二注釋五九六云何為色取即眼處耳處鼻處舌處身處色處聲處香處味處女根男根命根身表語表空界色輕性色軟性色適應性色增廣色相續色老性色無常性摶食也五九七云何為色之眼處為所有眼之四大種所造之淨色我所攝不可見有對之物由其不可見有對之眼於可見有對之色或已見正見當見應見亦是為眼眼處眼界眼根世間門海白田事道路引導此岸空村是為色之眼處五九八云何為色之眼處為所有眼之乃至有對之物於其不可見有對之眼可見有對之色或已礙正礙當礙應礙亦是為眼眼處眼界眼根世間門海白田事道路引導此岸空村是為色之眼處五九九云何為色之眼處為所有之眼之四大種乃至有對之物其不可見有對之眼於可見有對之色或已礙正礙當礙應礙亦是為眼眼處眼界眼根世間門海白田事道路引導此岸空村是為色之眼處六云何為色之眼處為所有眼之乃至有對之物依止於所有之眼因色眼觸或已生正生當生應生依止於所有之眼因色眼觸或已生正生當生應生眼觸所生之受乃至想乃至思乃至眼識或已生正生當生應生乃至依止於眼以色為所緣眼觸或已生正生當生應生依止於眼以色為所緣眼觸所生之受乃至想乃至思乃至眼識或已生正生當生應生亦是為眼眼處眼界眼根世間門海白田事道路引導此岸空村是為色之眼處六一云何為色之耳處為所有耳之四大種所造之淨色我所攝不可見有對之物依其不可見有對之耳或已聞正聞當聞應聞不可見有對之聲亦是為耳耳處耳界耳根世間門海白田事此岸空岸是為色之耳處六二云何為色之耳處為所有耳之乃至所攝不可見有對之物於其不可見有對之耳不可見有對之聲或已礙正礙當礙應礙亦是為耳乃至世間門海白田事此岸空村是為色之耳處六三云何為色之耳處為所有耳之乃至所攝不可見有對之物其不可見有對之耳於不可見有對之聲或已
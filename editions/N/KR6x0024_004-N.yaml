body:
  text: 第三概說品第一章一三聚九八一云何為善法耶即三善根無貪無瞋無癡其相應之受蘊想蘊行蘊識蘊其等起之身業語業意業是等為善法九八二云何為不善法耶即三不善根貪瞋癡及於彼同一處之諸煩惱其相應之受蘊想蘊行蘊識蘊其等起之身業語業意業是等為不善法九八三云何為無記法耶即善不善法異熟之欲纏色纏無色纏非所攝之受蘊想蘊行蘊識蘊或亦非善非不善非業異熟之所應作法及一切之色與無為界是等為無記法九八四云何為樂受相應法耶即於欲纏色纏非所攝除樂受而有相應於樂地之想蘊行蘊識蘊是等為樂受相應法九八五云何為苦受相應法耶即於欲纏除苦受而有相應於苦地之想蘊行蘊識蘊是等為苦受相應法九八六云何為不苦不樂受相應法耶即於欲纏色纏無色纏非所攝除不苦不樂受而有相應於不苦不樂地之想蘊行蘊識蘊是等為不苦不樂受相應法九八七云何為異熟法耶即善不善法異熟之欲纏色纏無色纏非所攝之受蘊乃至識蘊是等為異熟法九八八云何為異熟法法之法耶即善不善法之欲纏色纏無色纏非所攝之受蘊乃至識蘊是等為異熟法法之法九八九云何為非異熟非異熟法法之法耶即非善非不善非業異熟所有之所應作法及一切之色與無為界是等為非異熟非異熟法法之法九九云何為已取順取法耶即善不善法有漏異熟之欲纏色纏無色纏非所攝之受蘊乃至識蘊及色業之已作性是為已取順取法九九一云何為不已取順取法耶即有漏之善不善法之欲纏色纏無色纏之受蘊乃至識蘊及所有之非善非不善非業異熟之所應作法與色業之非已作性是等為不已取順取法九九二云何為不已取順取法耶即非所攝之道及道果與無為界是等為不已取不順取法九九三云何為已雜染順雜染法即三不善根貪瞋癡及於彼同一處之諸煩惱其相應之受蘊乃至識蘊其等起之身業語業意業是等為已雜染順雜染法九九四云何為不已雜染順雜染法耶即善無記有漏法之欲纏色纏無色纏非所攝之色蘊受蘊想蘊行蘊識蘊是等為不已雜染順雜染法九九五云何為不已雜染不順雜染法耶即非所攝之道及道果與無為界是等為不已雜染不順雜染法九九六云何為有尋有伺法耶即於欲纏色纏非所攝除尋伺而有相應於有尋有伺地之受蘊乃至識蘊是等為有尋有伺法九九七云何為無尋唯伺法耶即於色界非所攝除伺而有相應於無尋唯伺地之受蘊乃至識蘊是等為無尋唯伺法九九八云何為無尋無伺法耶即於欲纏色纏無色纏非所攝而相應於無尋無伺地之受蘊乃至識蘊及一切之色與無為界是等為無尋無伺法九九九云何為喜俱行法耶即於欲纏色纏非所攝除喜而有相應於喜地之受蘊乃至識蘊是等為喜俱行法一云何為樂俱行法耶即於欲纏色纏非所攝除喜而有相應於喜地之想蘊行蘊識蘊是等為樂俱行法一一云何為捨俱行法耶即於欲纏色纏無色纏非所攝除捨而有相應於捨地之想蘊行蘊識蘊是等為捨俱行法一二云何為見所斷法耶即三結有身見疑戒禁取一三此中云何為有身見耶即此處為無聞之異生不見聖者不知聖法於聖法而不調順不見善士不知善士之法於善士之法而不調順者以色為我而等隨觀或以我有色而等隨觀或於我以色或於色以我而等隨觀以受為我而等隨觀或我有受或於我以受或於受以我而等隨觀以想為我而等隨觀或以我有想或於我以想或於想以我而等隨觀以行為我而等隨觀或以行為有行或於我以行或於行以我而等隨觀以識為我而等隨觀或我有識或於我以識或於識以我而等隨觀如是所有之見成見見稠林見曠野見諍見惱見結取執取現貪取見惡道邪路邪性外道處顛倒執此言為有身見一四此中云何為疑耶即於佛法僧學疑惑於前邊後邊前邊後邊疑惑或於相依性緣起法疑惑如是所有之惑疑惑已疑惑性猶豫疑二分二路躊躇非一向執懷疑遲疑不沒入心之硬心留心意此言為疑一五此中云何為戒禁取耶即依佛教以外諸沙門婆羅門之戒淨禁淨戒禁而為清淨如是所有之見成見見稠林見曠野見諍見惱見結取執取現貪取見惡道邪路邪性外道處顛倒執此言為戒禁取一六即是等三結及於彼同一處之諸煩惱相應於彼之受蘊乃至識蘊於彼等起之身業語業意業是等為見所斷法一七云何為修所斷法耶即餘之貪瞋癡及於彼同一處之諸煩惱相應於彼之受蘊乃至識蘊於彼等起之身業語業意業是等為修所斷法一八云何為非見非修所斷法耶即善無記法之欲纏色纏無色纏非所攝之受蘊乃至識蘊及一切色與無為界是等為非見非修所斷法一九云何為見所斷因法耶即三結有身見疑戒禁取此中云何為有身見耶乃至是言為有身見此中云何為疑耶乃至是言為疑此中云何為戒禁取耶乃至是言為戒禁取一一即是等三結及於彼同一處之諸煩惱相應於彼之受蘊乃至識蘊於彼等起之身業語業意業是等為見所斷因法一一三結即有身見疑戒禁取是等諸法即見所斷於彼同一處有貪瞋癡是等諸法即見所斷因也於彼同一處有諸煩惱相應於彼之受蘊乃至識蘊於彼等起之身業語業意業是等為見所斷因法一一一云何為修所斷因法耶即餘之貪瞋癡於彼同一處之諸煩惱相應於彼之受蘊乃至識蘊於彼等起之身業語業意業是等為修所斷因法一一二云何為非見非修所斷因法耶即除上述彼之諸法餘之善不善無記法之欲纏色纏無色纏非所攝之受蘊想蘊行蘊識蘊及一切色與無為界是等為非見非修所斷因法一一三云何為流轉法耶即有漏善不善法之欲纏色纏無色纏之受蘊乃至識蘊是等為流轉法一一四云何為還滅法耶即四道之非所攝是等為還滅法一一五云何為非流轉非還滅法耶即善不善法異熟之欲纏色纏無色纏非所攝之受蘊乃至識蘊及非善非不善非業異熟之所應作法及一切之色與無為界是等為非流轉非還滅法一一六云何為有學法耶即四道之非所攝與下之三沙門果是等為有學法一一七云何為無學法耶即最上之阿羅漢果是為無學法一一八云何為非有學非無學法耶即除上述彼之諸法其餘之善不善無記法之欲纏色纏無色纏之受蘊乃至識蘊及一切色與無為界是等為非有學非無學法一一九云何為小法耶即欲纏之善不善無記法之色蘊乃至識蘊是等為小法一二云何為大法耶即色纏無色纏之善不善無記法之受蘊乃至識蘊是等為大法一二一云何為無量法耶即非所攝之道及道果與無為界是等為無量法一二二云何為小所緣法即依小法而生起之所有心心所法是等為小所緣法一二三云何為大所緣法耶即依大法而生起之所有心心所法是等為大所緣法一二四云何為無量所緣法耶即依無量法生起之所有心心所法是等為無量所緣法一二五云何為劣法耶即三不善根貪瞋癡於彼同一處之煩惱相應於彼之受蘊乃至識蘊於彼等起之身業語業意業是等為劣法一二六云何為中法耶即有漏善不善無記法之欲纏色纏無色纏之色蘊乃至識蘊是等為中法一二七云何為勝法耶即非所攝之道及道果與無為界是等為勝法一二八云何為邪定法耶即五無間業及邪見決定是等為邪定法一二九云何為正定法耶即四道之非所攝是等為正定法一三云何為不定法耶即除上述之諸法其餘之善不善無記法之欲纏色纏無色纏非所攝之受蘊乃至識蘊及一切之色與無為界是等為不定法一三一云何為道所緣法耶即依聖道而生起之所有心心所法是等為道所緣法一三二云何為道因法耶即聖道所有者除道支而有於彼相應之受蘊乃至識蘊是等為道因法一三三即以聖道所有者之道為因之正見除正見而有於彼相應之受蘊乃至識蘊是等為道因法聖道所有者之無貪無瞋無癡是等為道因其相應之受蘊乃至識蘊是等為道因法一三四云何為道增上法耶即以聖道為增上而生起之所有心心所法是等為道增上聖道所有者依觀增上而修道除觀而有於彼相應之受蘊乃至識蘊是等為道增上法一三五云何為已生法耶即諸所有之法為已生已存在已等生已轉生已現轉生已現起已生起已等生起已起已等起攝於已生起及已生起部份之色受想行識是等為已生法一三六云何為不已生法耶即諸所有之法為未已生未已存在未已等生未已轉生未已現轉生未已現起未已生起未已等生起未已起未己等起攝於未已生起及未已生起部份之色受想行識是等為不已生法一三七云何為當生法耶即諸善不善法之異熟欲纏色纏無色纏非所攝之受蘊乃至識蘊及所有之色業已作性當起者是等為當生法一三八云何為過去法耶即諸所有之法為過去已滅已變易已沒已去生已離去攝於過去以及過去部份之色受想行識是等為過去法一三九云何為未來法耶即諸所有之法為未已生未已存在未已等生未已轉生未已現轉生未已現起未已生起未已等生起未已起未已等起未來攝於未來部分之色受想行識是等為未來法一四云何為現在法耶即諸所有之法為已生已存在已等生已轉生已現轉生已現起已生起已等生起已起已等起現在攝於現在部份之色受想行識是等為現在法一四一云何為過去所緣法耶即依諸過去法而生起之所有心心所法是等為過去所緣法一四二云何為未來所緣法耶即依諸未來法而生起之所有心心所法是等為未來所緣法一四三云何為現在所緣法耶即依諸現在法而生起之所有心心所生是等為現在所緣法一四四云何為內法耶即諸所有法為彼彼有情為內各自自身各人已取之色受想行識是等為內法一四五云何為外法耶即諸所有法為彼彼之他有情他人內各自自身各人之乃至識是等為外法一四六云何為內外法耶即彼之兩者一四四一四五是等為內外法一四七云何為內所緣法耶即依內法而生起之所有心心所法是等為內所緣法一四八云何為外所緣法耶即依外法而生起之所有心心所法是等為外所緣法一四九云何為內外所緣法耶即依內外法而乃至法是等為內外所緣法一五云何為有見有對法耶即色處是等為有見有對法一五一云何為無見有對法耶即眼處耳處鼻處舌處身處聲處香處味處觸處是等為無見有對法一五二云何為無見無對法耶即受蘊想蘊行蘊識蘊及所有色之無見無對法處所攝者與無為界是等為無見無對法二因聚一五三云何為因法耶即三善因三不善因三無記因九欲纏因六色纏因六無色纏因六非所攝因一五四此中云何為三善因耶即無貪無瞋無癡一五五此中云何為無貪耶即所有之無貪無貪著無已貪著性無徧貪無戀著無已戀著性無貪欲無貪善根此言為無貪一五六此中云何為無瞋耶即所有之無瞋無污辱無已污辱性慈慈性已慈性哀愍哀愍性已哀愍性哀憐悲愍無瞋恚無惱害無瞋善根此言為無瞋一五七此中云何為無癡耶即於苦之慧於苦集之慧於苦滅之慧趣苦滅道之慧於前邊之慧於後邊之慧於前邊後邊之慧於相依性緣起法之慧如是所有之慧智慧擇思擇擇法解了近察各察聰叡善巧審悉審察思近解叡智怜利徧察觀正知導慧慧慧根慧力慧武器慧宮殿慧明慧現慧光慧寶無癡擇法之正見此言為無癡此等為三善因一五八此中云何為三不善因耶即貪瞋癡一五九此中云何為貪耶即所有之貪
至無明柵癡之不善根是言為無明一三一二此處云何為有愛耶所有於諸欲之欲欲乃至欲著是言為有愛一三一三此處云何為有見耶即我及世間存在如是所有見成見乃至顛倒執是言為有見一三一四此處云何為無有見耶即我及世間不存在如是所有之見成見乃至顛倒執是言為無有見一三一五此處云何為常見耶即我及世間為常如是所有之見成見乃至顛倒執是言為常見一三一六此處云何為斷見耶即我及世間為斷如是所有之見成見乃至顛倒執是言為斷見一三一七此處云何為有邊見耶即我及世間為有邊如是所有之見成見乃至顛倒執是言為有邊見一三一八此處云何為無邊見耶即我及世間為無邊如是所有之見成見乃至顛倒執是言為無邊見一三一九此處云何為隨前邊見耶即關聯於前邊而生起之見成見乃至顛倒執是言為隨前邊見一三二此處云何為隨後邊見耶即關聯於後邊而生起之見成見乃至顛倒執是言為隨後邊見一三二一此處云何為無慚耶即無慚應慚之事無慚惡不善法之成就是言為無慚一三二二此處何為無愧耶即無愧應愧之事無愧惡不善法之成就是言為無愧一三二三此處云何為慚耶即慚應慚之事慚惡不善法之成就是言為慚一三二四此處云何為愧耶即愧應愧之事愧惡不善法之成就是言為愧一三二五此處云何為惡言耶即同法者告言之時不順從不順從性惡言逆取喜反對不恭敬不敬心不作敬不隨順是言為惡言一三二六此處云何為惡友耶即依附倚賴倚親近等親近親敬等親敬親交於彼諸所有之不信破戒寡聞而有慳惡慧之人是言為惡友一三二七此處云何為善言耶即同法者告言之時從順從順性善言不逆取不喜反對恭敬敬心具敬而隨順是言為善言一三二八此處云何為善友耶即依附倚賴倚親近等親近親敬等親敬親交於彼諸所有之有信持戒多聞而有捨有慧之人是言為善友一三二九此處云何為入罪善巧耶即五罪蘊之罪及七罪蘊之罪諸所有其罪為入罪善巧慧智慧乃至無癡擇法正見是言為入罪善巧一三三此處云何為出罪善巧耶即自諸所有彼罪而出之善巧慧智慧乃至無癡擇法正見是言為出罪善巧一三三一此處云何為入定善巧耶即有尋有伺之定無尋唯伺之定無尋無伺之定諸所有此定為入定善巧慧智慧乃至無癡擇法正見是言為入定善巧一三三二此處云何為出定善巧耶即自諸所有彼定而出之善巧慧智慧乃至無癡擇法正見是言為出定善巧一三三三此處云何為界善巧耶即十八界眼界色界眼識界耳界聲界耳識界鼻界香界鼻識界舌界味界舌識界身界觸界身識界意界法界意識界諸所有是等之界為界善巧慧智慧乃至無癡擇法正見是言為界善巧一三三四此處云何為作意善巧耶即諸所有彼界為作意善巧慧智慧乃至無癡擇法正見是言為作意善巧一三三五此處云何為處善巧耶即十二處眼處色處耳處聲處鼻處香處舌處味處身處觸處意處法處諸所有是等處之處作意慧智慧乃至無癡擇法正見是言為處作意一三三六此處云何為緣起善巧耶即因無明而有行因行而有識因識而名色因名色而有六處因六處而有觸因觸而有受因受而有愛因愛而有取因取而有有因有而有生因生而有老死憂悲苦惱如是此為純苦蘊之集此處諸所有之慧智慧乃至無癡擇法正見是言為緣起善巧一三三七此處云何為處善巧耶即所有之法自彼等法之因緣而生起故彼等有處其處所有之慧智慧乃至無癡擇法正見是言為處善巧一三三八此處云何為非處善巧耶即所有之法由彼彼法之非因非緣而生起故彼彼有非處其處所有之慧智慧乃至無癡擇法正見是言為非處善巧一三三九此處云何為質直耶即質直性不歪性不曲性正直性是言為質直一三四此處云何為柔和耶所有之軟性柔和性不硬性不堅性心之謙讓性是言為柔和一三四一此處云何為堪忍耶所有之堪忍忍耐性受容性不逆性非暴惡性心之喜悅性是言為堪忍一三四二此處云何為可樂耶所有身之不過語之不過身語之不過是言為可樂一三四三此處云何為和順耶所有之捨離以麤惡麤暴之語而苦他怒他與忿怒其而不益於定語如斯則有溫順而順耳可樂徹心可愛愛於多人樂於多人之語其處有優雅之語親密之語柔和之語是言為和順一三四四此處云何為供養耶即二種供之養食供養與法供養此處或有供養者即依食供養或依法供養是為供養一三四五此處云何為不護根門耶此處有人由於眼見色已取相隨好不防眼根而住故貪憂惡不善法之流入為防彼故不行不守護眼根於眼根而不防護由耳而聞聲已乃至由鼻而嗅香已乃至由舌而味味已乃至由身而觸所觸已乃至由意而識法已取相隨好不防意根而住故貪憂惡不善法之流入為防彼故不行不守護意根於意根而不防護是等不護不守護不擁護不防護六根者是言為不護根門一三四六此處云何為食不知量耶此處有人為遊戲為傲逸為裝飾為嚴飾而不思擇不如理攝食其處於食有不知足之性不知量之性不思擇者是言為食不知量一三四七此處云何為能護根門耶此處有人由於眼見色已不取相隨好不防眼根而住故貪憂惡不善法之流入為防彼故行守護眼根於眼根而防護由耳而聞聲已乃至由鼻而嗅香已乃至由舌而味味已乃至由身而觸所觸已乃至由意而識法已不取相隨好不防意根而住故貪憂惡不善法之流入為防彼故行守護意根於意根而防護是等護守護擁護防護六根者是言為能護根門一三四八此處云何於食知量耶此處有人非為遊戲傲逸裝飾嚴飾乃至唯為此身之住為活為害之息為修梵行而思擇如理攝食如斯我舊受亡而新愛不生我亦可生存無罪住於安穩其處於食有知足性知量性思擇者是言為於食知量一三四九此處云何為失念耶所有之不念不隨念不專念不憶念不憶持浮遊性忘性是言為失念一三五此處云何為不正知耶所有之無智無見乃至無明柵癡之不善根是言為不正知一三五一此處云何為正念耶所有之念隨念專念憶念憶持不浮遊性不忘性是言為正念一三五二此處云何為正知耶所有之慧智慧乃至無癡擇法正見是言為正知一三五三此處云何為思擇力耶所有之慧智慧乃至無癡擇法正見是言為思擇力一三五四此處云何為修習力耶所有諸善法之練習修習多所作是言為修習力一三五五此處云何為止耶所有心之住乃至正見是言為止一三五六此處云何為觀耶所有之慧慧智乃至無癡擇法正見是言為觀一三五七此處云何為止相耶所有心之住乃至正見是言為止相一三五八此處云何為勤勵相耶所有心之發勤乃至正精進是言為勤勵相一三五九此處云何為勤勵耶所有心之發勤乃至正精進是言為勤勵一三六此處云何為不散亂耶所有心之住乃至正見是言為不散亂一三六一此處云何為破戒耶所有身之過失或錯誤語之過失身語之過失是言為破戒一切之惡戒亦為破戒一三六二此處云何為破見耶即無惠施親愛祠祀無妙行惡行之業果異熟無此世他世無母無父無化生之有情於世間無自通達此世彼世作證教他正至正行之沙門婆羅門如斯見成見乃至顛倒執是言為破見一切之邪見亦言為破見一三六三此處云何為具戒耶即身之無過失或無錯誤語之無過失身語之無過失是言為具戒一切之戒律儀亦為具戒一三六四此處云何為具見耶即有惠施親愛祠祀有妙行惡行之業果異熟有此世他世有母有父有化生之有情於世間有自通達此世彼世作證教他正至正行之沙門婆羅門如斯有慧智慧乃至無癡擇法正見是言為具見一三六五此處云何為淨戒耶即身無過失或無錯誤語無過失身語無過失是言為淨戒一三六六此處云何為淨見耶即業所作之慧諦隨順之慧道具足之慧果具足之慧所謂見清淨者即所有之慧智慧乃至無癡擇法正見所謂如見精進者即所有心之發勤乃至正精進所謂厭者即生畏老畏病畏死畏所謂順厭處者即生老病死所謂厭者之如理精勤者即此處有比丘為未生惡不善法之不生故起欲發勤持策精進心為已生惡不善法之斷故起欲發勤持策精進心為未生善法之生故起欲發勤持策精進心為已生善法之住不忘倍增廣大修滿故起欲發勤持策精進心一三六七所謂於善法不喜足者即諸善法於修習之不喜足多欲所謂於精勤不被遮止者即諸善法於修習之恭敬所作性常所作性堅住所作性不耽溺性不棄志欲性不棄精進性練習修習多所作所謂明者即三明宿住隨念智明有情生死智明漏盡智明所謂解脫者即二解脫心與勝解等之涅槃所謂盡智者即道具足智所謂無生智者即果具足智

body:
  text: 法集論歸命彼世尊應供正等者論母論之論母百二十二門三法門二十二門善法不善法無記法樂受相應法苦受相應法不苦不樂受相應法異熟法異熟法法非異熟非異熟法法已取順取法不已取順取法不已取不順取法已雜染順雜染法不已雜染順雜染法不已雜染不順雜染法有尋有伺法無尋唯伺法無尋無伺法喜俱行法樂俱行法捨俱行法見所斷法修所斷法非見非修所斷法見所斷因法修所斷因法非見非修所斷因法流轉法還滅法非流轉非還滅法有學法無學法非有學非無學法小法大法無量法小所緣法大所緣法無量所緣法劣法中法勝法邪定法正定法不定法道所緣法道因法道增上法已生法不已生法當生法過去法未來法現在法過去所緣法未來所緣法現在所緣法內法外法內外法內所緣法外所緣法內外所緣法有見有對法無見有對法無見無對法以上三聚二法門百門因法非因法有因法無因法因相應法因不相應法於因法為有因於有因法為非因於因法為因相應於因相應法為非法於非因法為有因為無因以六種是因類以上因聚有緣法無緣法有為法無為法有見法無見法有對法無對法有色法無色法世間法出世間法所識法非所識法以上小中雙漏法非漏法有漏法無漏法漏相應法漏不相應法於漏法為有漏於有漏法為非漏於漏法為漏相應於漏相應法為非漏於漏不相應法為有漏為無漏以上漏聚結法非結法順結法非順結法結相應法結不相應法於結法為順結於順結法為非結於結法為結相應於結相應法為非結於結不相應法為順結為非順結以上結聚繫法非繫法順繫法非順繫法繫相應法繫不相應法於繫法為順繫於順繫法為非繫於繫法為繫相應於繫相應法為非繫於繫不相應法為順繫為不順繫以上繫聚暴流法非暴流法順暴流法非順暴流法暴流相應法暴流不相應法於暴流法為順暴流於順暴流法為非暴流於暴流法為暴流相應於暴流相應法為非暴流於暴流不相應法為順暴流為非順暴流以上暴流聚軛法非軛法順軛法非順軛法軛相應法軛不相應法於軛法為順軛於順軛法為非軛於軛法為軛相應於軛相應法為非軛於軛不相應法為順軛為不順軛以上軛聚蓋法非蓋法順蓋法非順蓋法蓋相應法蓋不相應法於蓋法為順蓋於順蓋法為非蓋於蓋法為蓋相應於蓋相應法為非蓋於蓋不相應法為順蓋為不順蓋以上蓋聚取著法非取著法已取著法非已取著法取著相應法取著不相應法以取著法為已取著以已取著法為非取著以取著不相應法為已取著為非已取著以上取著聚有所緣法非所緣法心法非心法心所法非心所法心相應法心不相應法心相雜法心不相雜法心等起法心非等起法心俱在法心非俱在法心隨轉法心非隨轉法心相雜等起法心非相雜等起法心相雜等起俱在法心非相雜等起俱在法心相雜等起隨轉法心非相雜等起隨轉法內法外法所造法非所造法已取法非已取法以上大中雙取法非取法順取法非順取法取相應法取不相應法於取法為順取於順取法為非取於取法為取相應於取相應法為非取於取不相應法為順取為非順取以上取聚煩惱法非煩惱法順雜染法非順雜染法已雜染法非已雜染法煩惱相應法煩惱不相應法於煩惱法為順雜染於以順雜染法為非煩惱於煩惱法為已雜染於已雜染法為非煩惱於煩惱法為煩惱相應於煩惱相應法為非煩惱於煩惱不相應法為順雜染為非順雜染以上煩惱聚見所斷法非見所斷法修所斷法非修所斷法見所斷因法非見所斷因法修所斷因法非修所斷因法有尋法無尋法有伺法無伺法有喜法無喜法喜俱行法喜不俱行法樂俱行法樂不俱行法捨俱行法捨不俱行法欲纏法非欲纏法色纏法非色纏法無色纏法非無色纏法所攝繫法非所攝法出法不出法定法不定法有上法無上法有諍法無諍法以上殘餘二法經之論母四十二門明分法無明分法電光喻法金剛喻法愚法賢法黑法白法苦行法非苦行法增語法增語道法詞法詞道法施設法施設道法名及色無明及有愛有見及無有見常見及斷見有邊見及無邊見隨前邊見及隨後邊見無慚及無愧慚及愧惡言及惡友善言及善友入罪善巧及出罪善巧入定善巧及出定善巧界善巧及作意善巧處善巧及緣起善巧處善巧及非處善巧質直及柔和堪忍及可樂和順及供養不護根門及食不知量能護根門及於食知量失念及不正知正念及正知思擇力及修習力止及觀止相及勤勵相勤勵及不散亂破戒及破見具戒及具見淨戒及淨見見清淨及如見精進於順厭處厭與厭者之如理精勤於善法不喜足於精勤不被遮止明及解脫盡智及無生智

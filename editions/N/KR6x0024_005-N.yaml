可言為以取不相應為順取或以取不相應為不順取一五四八云何為煩惱法耶即十煩惱事貪瞋癡慢見疑惛沈掉舉無慚無愧貪者於八貪俱行心之生起而生瞋者於二憂俱行心之生起而生癡者於一切之不善而生慢者於四成見不相應貪俱行心之生起而生見者於四成見相應心之生起而生疑者於疑俱行心之生起而生惛沈者於有行之不善而生掉舉無慚無愧者於一切之不善而生是等為煩惱法一五四九云何為非煩惱法耶即除諸煩惱餘之不善於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非煩惱法一五五云何為順雜染法耶即於三地之善不善於三地之異熟於三地之所應作無記及一切之色是等為順雜染法一五五一云何為不順雜染法耶即四道非所攝四沙門果及涅槃是等為不順雜染法一五五二云何為已雜染法耶即十二不善心之生起是等為已雜染法一五五三云何為不已雜染法耶即於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為不已雜染法一五五四云何為煩惱相應法耶即十二不善心之生起是等為煩惱相應法一五五五云何為煩惱不相應法耶即於四地之善於四地之異熟於三地所應作無記色及涅槃是等為煩惱不相應法一五五六云何為以煩惱法為順雜染耶即彼之諸煩惱為以煩惱為順雜染一五五七云何為以順雜染法為非煩惱耶即除諸煩惱餘之不善於三地之善於三地之異熟於三地之所應作無記及一切之色是等為以順雜染法為非煩惱無順雜染法者即不可言為以煩惱為順雜染或以順雜染為非煩惱一五五八云何為以煩惱法為已雜染耶即彼之諸煩惱為以煩惱為已雜染一五五九云何為以已雜染法為非煩惱耶即除諸煩惱餘之不善是等為以已雜染法為非煩惱無已雜染法者即不可言為以煩惱為已雜染或以已雜染為非煩惱一五六云何為以煩惱法為煩惱相應耶即二之三煩惱共生之時是等為以煩惱法為煩惱相應一五六一云何為以煩惱相應法為非煩惱耶即除諸煩惱餘之不善是等為以煩惱相應法為非煩惱煩惱不相應法者即不可言為以煩惱為煩惱相應或以煩惱相應為非煩惱一五六二云何為以煩惱不相應法為順雜染耶即於三地之善於三地異熟於三地之所應作無記及一切之色是等為以煩惱不相應法為順雜染一五六三云何為以煩惱不相應法為不順雜染耶即四道非所攝四沙門果及涅槃是等為以煩惱不相應法為不順雜染煩惱相應法者即不可言為以煩惱不相應為順雜染或以煩惱不相應為不順雜染一五六四云何為見所斷法耶即四成見相應疑俱行心之生起是等為見所斷法四成見不相應貪俱行心之生起二憂俱行心之生起是等之諸法者即應為見所斷非見所斷一五六五云何為非見所斷法耶即掉舉俱行心之生起於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非見所斷法一五六六云何為修所斷法耶即掉舉俱行心之生起是等為修所斷法四成見不相應貪俱行心之生起二憂俱行心之生起是等之諸法者即可為修所斷可為非修所斷一五六七云何為非修所斷法耶即四成見相應心之生起疑俱行心之生起於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非修所斷法一五六八云何為見所斷因法耶即四成見相應心之生起疑俱行心之生起除生於此處之癡是等為見所斷因法四成見不相應貪俱行心之生起憂俱行心之生起是等之諸法者即應為見所斷因非見所斷因一五六九云何為非見所斷因法耶即疑俱行之癡掉舉俱行心之生起於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非見所斷因法一五七云何為修所斷因法耶即掉舉俱行心之生起除生於此處之癡是等為修所斷因法四成見不相應貪俱行心之生起二憂俱行心之生起是等之諸法者即應為修所斷因或非修所斷因一五七一云何為非修所斷因法耶即四成見相應心之生起疑俱行心之生起掉舉俱行之癡於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非修所斷因法一五七二云何為有尋法耶即欲纏之善不善由欲纏善異熟之十一心生起由不善異熟之二由所應作之十一由色纏初靜慮之善異熟及所應作由出世間初靜處之善及異熟除生於此處之尋是等為有尋法一五七三云何為無尋法耶即自二之五識色纏三法四法靜慮之善異熟及所應作由四無色之善異熟及所應作由出世間三法四法靜慮之善異熟及所應作色及涅槃是等為無尋法一五七四云何為有伺法耶即欲纏之善不善由欲纏善異熟之十一心之生起由不善之異熟之二由所應作之十一由色纏一法二法靜慮之善異熟及所應作由出世間一法二法靜慮之善及異熟除生於此處之伺是等為有伺法一五七五云何為無伺法耶即由二之五識色纏二法三法靜慮之善異熟所應作由四無色之善異熟所應作由出世間二法三法靜慮之善異熟伺色與涅槃是等為無伺法一五七六云何為有喜法耶即由欲纏善之四喜俱行心之生起由不善之四由欲纏善異熟之五由所應作之五由色纏二法三法靜慮之善異熟所應作由出世間二法三法靜慮之善及異熟除生於此處之喜是等為有喜法一五七七云何為無喜法耶即由欲纏善之四捨俱行心之生起由不善之八由欲纏善異熟之十一由不善異熟之七由所應作之六由色纏二法二法靜慮之善異熟所應作由出世間二法二法靜慮之善異熟喜色及涅槃是等為無喜法一五七八云何為喜俱行法耶即由欲纏善之四喜俱行心之生起由不善之四由欲纏善異熟之五由所應作之五由色纏二法三法靜慮之善異熟所應作由出世間二法三法靜慮之善及異熟除生於此處之喜是等為喜俱行法一五七九云何為非喜俱行法耶即自欲纏善之四捨俱行心之生起由不善之八由欲纏善異熟之十一由不善異熟之七由所應作之六由色纏二法二法靜慮之善異熟所應作由四無色之善異熟所應作由出世間二法二法靜慮之善及異熟色及涅槃是等為非喜俱行法一五八云何為樂俱行法耶即由欲纏善之四喜俱行心之生起由不善之四由欲纏善異熟之六由所應作之五由色纏三法四法靜慮之善異熟所應作由出世間三法四法靜慮之善及異熟除生於此處之樂是等為樂俱行法一五八一云何為非樂俱行法耶即由欲纏善之四捨俱行心之生起由不善之八由欲纏善異熟之十由不善異熟之七由所應作之六由色纏第四靜慮之善異熟所應作由四無色之善異熟所應作由出世間第四靜慮之善及異熟樂色及涅槃是等為非樂俱行法一五八二云何為捨俱行法耶即由欲纏善之四捨俱行心之生起由不善之六由欲纏善異熟之十由不善異熟之六由所應作之六由色纏第四靜慮之善異熟所應作由四無色之善異熟所應作由出世間第四靜慮之善及異熟除生於此處之捨是等為捨俱行法一五八三云何為非捨俱行法耶即由欲纏善之四喜俱行心之生起由不善之六由欲纏善異熟之六由不善異熟之一由所應作之五由色纏三法四法靜慮之善異熟所應作之捨色及涅槃是等為非捨俱行法一五八四云何為欲纏法耶即善不善一切欲纏之異熟欲纏之所應作無記及一切之色是等為欲纏法一五八五云何為非欲纏法耶即色纏無色纏非所攝是等為非欲纏法一五八六云何為色纏法耶即自色纏四法五法靜慮之善異熟所應作是等為色纏法一五八七云何為非色纏法耶即欲纏無色纏非所攝是等為非色纏法一五八八云何為無色纏法耶即由四無色之善異熟所應作而成是等為無色纏法一五八九云何為非無色纏法耶即欲纏色纏非所攝是等為非無色纏法一五九云何為所攝法耶即於三地之善不善於三地之異熟於三地之所應作無記及一切之色是等為所攝法一五九一云何為非所攝法耶即四道非所攝四沙門果及涅槃是等為非所攝法一五九二云何為出法耶即四道非所攝是等為出法一五九三云何為不出法耶即於三地之善不善於四地之異熟於三地之所應作無記色及涅槃是等為不出法一五九四云何為定法耶即四成見相應心之生起二憂俱行心之生起是等之諸法者即應為定不定四道非所攝是等為定法一五九五云何為不定法耶即四成見不相應貪俱行心之生起疑俱行心之生起掉舉俱行心之生起於三地之善於四地之異熟於三地之所應作無記色及涅槃是等為不定法一五九六云何為有上法耶即於三地之善不善於三地之異熟於三地之所應作無記及一切之色是等為有上法一五九七云何為無上法耶即四道非所攝四禪力及涅槃是等為無上法一五九八云何為有諍法耶即十二不善心之生起是等為有諍法一五九九云何為無諍法耶即於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為無諍法

body:
  text: 第四義釋品一三六八云何為善法耶即於四地之善是等為善法一三六九云何為不善法耶即十二不善心之生起是等為不善法一三七云何為無記法耶即於四地之異熟於三地之所應作無記色及涅槃是等為無記法一三七一云何為樂受相應法耶即自欲纏善之四喜俱行心之生起自不善之四自欲纏善之異熟及所應作之五自色纏之三種靜慮之善異熟與所應作由出世間之三種四種靜慮之善及異熟而成除生於此處之樂受是等為樂受相應法一三七二云何為苦受相應法耶即二憂俱行心之生起苦俱行意識除生於此處之苦受是等為苦受相應法一三七三云何為不苦不樂受相應法耶即自欲纏善之四捨俱行心之生起由不善之六由欲纏善異熟之十由不善異熟之六由所應作之六由色纏第四靜慮之善異熟與所應作由四無色纏之善異熟與所應作由出世間第四靜慮之善與異熟而成除生於此處之不苦不樂受是等為不苦不樂受相應法而三受及色與涅槃之是等諸法不可言之為樂受相應苦受相應不苦不樂受相應一三七四云何為異熟法耶即於四地之異熟是等為異熟法一三七五云何為異熟法法之法耶即於四地之善不善是等為異熟法法之法一三七六云何為非異熟非異熟法法之法耶即於三地之所應作無記色及涅槃是等為非異熟非異熟法法之法一三七七云何為已取順取法耶即於三地之異熟及色之業所作是等為已取順取法一三七八云何為不已取順取法耶即非於三地之善不善於三地之所應作無記及色之業所作是等為不已取順取法一三七九云何為不已取不順取法耶即四道非所攝四沙門果及涅槃是等為不已取不順取法一三八云何為已雜染順雜染法耶即十二不善心之生起是等為已雜染順雜染法一三八一云何為不已雜染順雜染法耶即於三地之善於三地之異熟於三地之所應作無記及一切之色是等為不已雜染順雜染法一三八二云何為不已雜染不順雜染法耶即四道非所攝四沙門果及涅槃是等為不已雜染不順雜染法一三八三云何為有尋有伺法耶即由欲纏之善不善欲纏善異熟之十一心之生起由不善異熟之二由所應作之十一由色纏初靜慮之善異熟所應作由出世間初靜慮之善及異熟而成除生於此處之尋伺是等為有尋有伺法一三八四云何為無尋唯伺法耶即由於色纏五種法之第二靜慮善異熟及所應作由於出世間五種法之第二靜慮善及異熟而成除生於此處之伺是等為無尋唯伺法一三八五云何為無尋無伺法耶即由二之五識色纏之三法三法靜慮善異熟及所應作而成由四之無色善異熟及所應作而成由出世間之三法三法靜慮善及異熟而成於五種法於第二靜慮所生伺及色與涅槃是等為無尋無伺法一三八六尋俱生之伺者不可言為有尋有伺無尋唯伺無尋無伺亦然一三八七云何為喜俱行法耶即由欲纏善之四喜俱行心之生起由不善之四由欲纏善異熟之五由所應作之五由色纏之二法三法靜慮善異熟及所應作而成由出世間之二法三法靜慮之善及異熟而成除生於此處之喜是等為喜俱行法一三八八云何為樂俱行法耶即由欲纏善之四喜俱行心之生起由不善之四由欲纏善異熟之六由所應作之五由色纏之三法四法靜慮之善異熟及所應作而成由出世間之三法四法靜慮善及異熟而成除生起於此處之樂是等為樂俱行法一三八九云何為捨俱行法耶即由欲纏善之四捨俱行心之生起由不善之六由欲纏善異熟之十由不善異熟之六由所應作之六由色纏之第四靜慮之善異熟及所應作而成由四之無色之善異熟及所應作而成自出世間第四靜慮之善及異熟而成除生於此處之捨是等為捨俱行法喜者非喜俱行是樂俱行非捨俱行樂者不可言非樂俱行是喜俱行非捨俱行是喜俱行一三九云何為見所斷法耶即四成見相應心之生起疑俱行心之生起是等為見所斷法一三九一云何為修所斷法耶即掉舉俱行心之生起是等為修所斷法一三九二云何為見所斷修所斷法耶即四成見不相應貪俱行心之生起二之憂俱行心之生起是等之諸法者應為見所斷可為修所斷法一三九三云何為非見非修所斷法耶即於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非見非修所斷法一三九四云何為見所斷因法耶即四成見相應心之生起疑俱行心之生起除生於此處之癡是等為見所斷因法一三九五云何為修所斷因法耶即掉舉俱行心之生起除生於此處之癡是等為修所斷因法四成見不相應貪俱行心之生起二之憂俱行心之生起是等之諸法者應為見所斷因應為修所斷因一三九六云何為非見非修所斷因法耶即疑俱行癡掉舉俱行癡於四地之善於四地之異熟於三地之所應作無記色及涅槃是等為非見非修所斷因法一三九七云何為流轉法耶即於三地之善不善是等為流轉法一三九八云何為還滅法耶即四道非所攝是等為還滅法一三九九云何為非流轉非還滅法耶即於四地之異熟於三地之所應作無記色及涅槃是等為非流轉非還滅法一四云何為有學法耶即四道非所攝及下三沙門果是等為有學法一四一云何為無學法耶即上阿羅漢果是等為無學法一四二云何為非有學非無學法耶即於三地之善不善於三地之異熟於三地之所應作無記色及涅槃是等為非有學非無學法一四三云何為小法耶即欲纏善不善一切欲纏之異熟欲纏所應作無記及一切之色是等為小法一四四云何為大法耶即色纏無色纏之善無記是等為大法一四五云何為無量法耶即四道非所攝四沙門果及涅槃是等為無量法一四六云何為小所緣法耶即一切欲纏之異熟所應作意界所應作因意識界善俱行是等為小所緣法一四七云何為大所緣法耶即識無邊處非想非非想處是等為大所緣法一四八云何為無量所緣法耶即四道非所攝及四沙門果是等為無量所緣法由欲纏善之四智不相應心之生起由所應作之四智不相應心之生起一切之不善是等之諸法者即應為小所緣大所緣非無量所緣又不可言為小所緣大所緣由欲纏善之四智相應心之生起由所應作之四智相應心之生起由色纏第四靜慮之善及所應作所應作因意識界捨俱行是等之諸法者即應為小所緣大所緣無量所緣又不可言為小所緣或大所緣或無量所緣由色纏三法四法靜慮之善異熟及所應作而成第四靜慮之異熟空無邊處無所有處是等之諸法者即不可言為小所緣或大所緣或無量所緣色及涅槃者為無所緣一四九云何為劣法耶即十二不善心之生起是等為劣法一四一云何為中法耶即於三地之善於三地之異熟於三地之所應作無記及一切之色是等為中法一四一一云何為勝法耶即四道非所攝及四沙門果及涅槃是等為勝法一四一二云何為邪定法耶即四成見相應心之生起二憂俱行心之生起是等之諸法者即應為邪定不定一四一三云何為正定法耶即四道非所攝是等為正定法一四一四云何為不定法耶即四成見不相應貪俱行心之生起疑俱行心之生起掉舉俱行心之生起於三地之善於四地之異熟於三地之所應作無記色及涅槃是等為不定法一四一五云何為道所緣法耶即自欲纏善之四智相應心之生起自所應作之四智相應心之生起是等之諸法者應為道所緣非道因應為道增上又不可言為道所緣或道增上四聖道者即非道所緣為道因應為道增上又不可言為道增上色纏第四靜慮之善由所應作所應作因意識界捨俱行是等之諸法者應為道所緣非道因非道增上又不可言為道所緣由欲纏善之四智不相應心之生起由一切之不善一切之欲纏異熟所應作之六心生起由色纏三法四法靜慮之善異熟及所應作而成由第四靜慮之異熟四無色之善異熟及所應作而成及四沙門果是等之諸法者不可言為道所緣或道因或道增上色及涅槃者即為無所緣一四一六云何為已生法耶即於四地之異熟及色之業所作而成是等之諸法者即應為已生應為當生不可言為不已生於四地之善不善於三地之所應作無記及色之非業所作而成是等之諸法者即可為已生可為不已生不可言為當生涅槃者即不可言為已生不已生當生除涅槃一切之諸法者即應為過去未來現在涅槃者不可言為過去或未來或現在一四一七云何為過去所緣法耶即識無邊處非想非非想處是等為過去所緣法嚴密言之非未來所緣者一四一八云何為未來所緣法耶即二之五識及三之意識界是等為未來所緣法由欲纏善異熟之十心生起由不善異熟之意識界捨俱行所應作因意識界喜俱行是等之諸法者即應為過去所緣未來所緣現在所緣由欲纏善不善所應作之九心生起由起纏第四靜慮之善及所應作而成是等之諸法者即應為過去所緣未來所緣現在所緣不可言為過去所緣或未來所緣由色纏三法四法靜慮之善異熟所應作及第四靜慮之異熟虛空無邊處無所有處四道非所攝及四沙門果是等之諸法者即不可言為過去所緣或未來所緣或現在所緣色及涅槃者即為無所緣除意根繫色涅槃一切之法者即可為內法可為外法可為內外法意根繫色涅槃者即為外法一四一九云何為內所緣法耶即識無邊處非想非非想處是等為內所緣法一四二云何為外所緣法耶即由色纏三法四法靜慮之善異熟及所應作而成第四靜慮之異熟虛空無邊處四道非所攝及四沙門果是等為外所緣法除色由一切之欲纏善不善無記法色纏第四靜慮之善及所應作而成是等之諸法者即應為內所緣外所緣內外所緣無所有處者即不可言為內所緣或外緣或內外所緣色及涅槃者即為無所緣一四二一云何為有見有對法耶即色處是等為有見有對見一四二二云何為無見有對法耶即眼處乃至所觸處是等為無見有對法一四二三云何為無見無對法耶即於四地之善不善於四地之異熟於三地之所應作無記及色之無見無對法處所攝及涅槃是等為無見無對法一四二四云何為因法耶即三善因三不善因三無記因無貪者為善因無瞋者為善因無癡者為善因是等於四地之善生無癡之善因者即除自欲纏善之四智不相應心之生起而於四地之善生貪者即於八貪俱行心之生起而生瞋者即於二憂俱行心之生起而生癡者即於一切之不善而生無貪者為異熟因無瞋者為異熟因是等除由欲纏異熟之無因心之生起而於四地之異熟生無癡之異熟因者即除由欲纏異熟之無因心除四智不想應心之生起而於四地之異熟生無貪者為所應作因無瞋者為所應作因是等除自欲纏所應作之無因心而於三地之所應作生無癡之所應作因者除由欲纏所應作之無因心生起除四智不相應心之生起而於三地之所應作生是等為因法一四二五云何為非因法耶即除因於四地之善不善於四地之異熟於三地之所應作無記色及涅槃是等為無因法一四二六云何為有因法耶即除疑俱行掉舉俱行之癡餘之為不善於四地之善除由欲纏異熟之無因心生起於四地之異熟除由欲纏所應作之無因心生起於三地之所應作無記是等為有因法一四二七云何為無因法耶即疑俱行之癡掉舉俱行之癡及二之五識三之意界五之無因之意識界色及涅槃是等為無因法一四二八云何為因相應法耶即除疑俱行掉舉俱行之癡餘為不善於四地之善除由欲纏異熟之